<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Techno360 Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --font-body: 'Inter', sans-serif;
      --font-display: 'Outfit', sans-serif;
      --color-bg: #f8fafc;
      --color-card: #ffffff;
      --color-pink: #e21a61;
      --color-pink-hover: #c4124e;
      --color-text-dark: #0f172a;
      --color-text-muted: #64748b;
      --color-border: #e2e8f0;
      --radius: 16px;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-body);
      background-color: var(--color-bg);
      color: var(--color-text-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .login-container {
      width: 100%;
      max-width: 440px;
    }
    
    .login-card {
      background-color: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    
    .logo {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }
    
    .logo span {
      color: var(--color-pink);
    }
    
    .subtitle {
      font-size: 14px;
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: 32px;
    }
    
    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .form-group label {
      font-size: 13px;
      font-weight: 600;
    }
    
    .form-control {
      padding: 12px 16px;
      font-size: 14px;
      font-family: var(--font-body);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .form-control:focus {
      border-color: var(--color-pink);
    }
    
    .btn-login {
      width: 100%;
      padding: 12px;
      background-color: var(--color-pink);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s, transform 0.1s;
    }
    
    .btn-login:hover {
      background-color: var(--color-pink-hover);
    }
    
    .btn-login:active {
      transform: scale(0.98);
    }
    
    .alert-container {
      margin-bottom: 20px;
    }
    
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      background-color: #fef2f2;
      color: #ef4444;
      border: 1px solid #fecaca;
      list-style: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        TECHNO<span>360</span>
      </div>
      <div class="subtitle">Admin Portal Dashboard</div>
      
      {% if messages %}
        <div class="alert-container">
          {% for message in messages %}
            <div class="alert">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      
      <form method="POST" action="{% url 'admin_login' %}">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input type="text" id="username" name="username" class="form-control" placeholder="Enter username or email" required autofocus>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-login">Sign In</button>
      </form>
    </div>
  </div>

</body>
</html>
